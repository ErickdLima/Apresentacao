                    id="mensagem"
                    rows="6"
                    placeholder="Digite sua mensagem"></textarea>

            <!-- Botão de envio -->
                <button type="submit">Enviar</button>

            </form>

        <!-- Mensagem exibida pelo JavaScript -->
